server {
    listen 80;
    server_name jetonpeche.fr www.jetonpeche.fr;
    return 301 https://$host$request_uri;
}

# BLOC 2 : Configuration HTTPS
server {
    listen 443 ssl;
    server_name jetonpeche.fr www.jetonpeche.fr;

    # Note : Vérifie que le dossier "live/jetonpeche.fr" est bien celui créé par certbot
    ssl_certificate /etc/nginx/certs/live/www.jetonpeche.fr/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/live/www.jetonpeche.fr/privkey.pem;

    # Optimisations SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend
    location / {
        proxy_pass http://front:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api {
        proxy_pass http://api:8080; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}