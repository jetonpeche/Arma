<!-- En-tête de la page -->
<div class="page-header">
    <div class="header-titles">
        <h1>Cartographie Planétaire</h1>
        <div class="unsc-subtitle">// ARCHIVES COLONIALES - DÉPARTEMENT D'ASTROMÉTRIE</div>
    </div>

    @if(droit?.peutLire)
    {
        <button matButton="filled" (click)="GestionPlanete()">
            <mat-icon>admin_panel_settings</mat-icon>
            GESTION DES PLANÈTES
        </button>
    }
</div>

<!-- Grille CSS Native -->
<div class="astro-grid-container">
    @for (element of listePlanete(); track element.id) 
    {
        <mat-card class="unsc-astro-card" appearance="outlined">
            
            <!-- Écran de visualisation orbitale -->
            <div class="astro-viewport">
                <!-- Brackets de ciblage (Décoratif) -->
                <div class="target-tl"></div>
                <div class="target-tr"></div>
                <div class="target-bl"></div>
                <div class="target-br"></div>

                <img [src]="element.nomFichier" [alt]="element.nom" class="planet-img">
                
                <div class="scan-overlay"></div>
                
                <div class="astro-status">
                    <span class="status-dot"></span>
                    SCAN ORBITAL ACTIF
                </div>
            </div>

            <!-- Données planétaires -->
            <mat-card-content class="astro-data">
                <h2 class="planet-name">{{ element.nom }}</h2>
                <div class="data-divider"></div>
                
                <div class="desc-container">
                    <span class="desc-label">// ARCHIVE TOPOGRAPHIQUE :</span>
                    <p class="planet-desc">{{ element.description }}</p>
                </div>
            </mat-card-content>

        </mat-card>
    }
</div>
