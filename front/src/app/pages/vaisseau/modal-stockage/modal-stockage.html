<h2 mat-dialog-title>Stockage du vaisseau {{ dialogData.nom }}</h2>
<mat-dialog-content>
    <mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">
        <mat-tree-node *matTreeNodeDef="let node">
            <button matIconButton disabled></button>
            {{node.nom}}
        </mat-tree-node>

        <mat-tree-node *matTreeNodeDef="let node;when: hasChild" 
                                  matTreeNodeToggle
                                 [cdkTreeNodeTypeaheadLabel]="node.name" style="padding-left: 0;">

            <button matIconButton matTreeNodeToggle>
                <mat-icon class="mat-icon-rtl-mirror">
                    {{tree.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
                </mat-icon>
            </button>
            {{node.nom}}
        </mat-tree-node>
    </mat-tree>
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton="filled" mat-dialog-close>Fermer</button>
</mat-dialog-actions>
