<div class="page-header">
    <div class="header-titles">
        <h1>Habilitations</h1>
        <div class="unsc-subtitle">// PROTOCOLE D'HABILITATION DE SÉCURITÉ - NETCOM SECURE</div>
    </div>

    <div class="header-actions">
    @if(droit.peutEcrire)
    {
        <button matButton="filled" (click)="OuvrirModalAjouterModifierDroitGroupe()">
            <mat-icon>add</mat-icon>
            Nouveau groupe de droit
        </button>

        <button matButton="filled" (click)="OuvrirModalDroitGroupePersonnage()">
            <mat-icon>edit</mat-icon>
            Droit groupe personnage
        </button>
    }
    </div>
</div>

<mat-list role="list">
    @for (element of listeDroitGroupe(); track element.id; let last = $last) 
    {
        <mat-list-item  role="listitem">
            <div>
                {{ element.nom }}

                <div>
                    @if (droit.peutEcrire)
                    {
                        <button matMiniFab (click)="OuvrirModalAjouterModifierDroitGroupe(element)">
                            <mat-icon>edit</mat-icon>
                        </button>&nbsp;
                    }

                    @if (droit.peutSupprimer) 
                    {
                        <jp-button-loader matMiniFab 
                                                    [loading]="btnClick()"
                                                    icon="delete"
                                                    (clicked)="OurvrirModalConfirmationSupprimer(element)" />
                    }
                </div>
            </div>
        </mat-list-item>

        @if (!last)
        {
            <mat-divider role="separator"></mat-divider>
        }
    }
</mat-list>
