<div class="page-header">
    <div class="header-titles">
        <h1>Décorations et Médailles</h1>
        <div class="unsc-subtitle">// ORDRES ET DISTINCTIONS DU CORPS DES MARINES</div>
    </div>
    
    @if(droit.peutEcrire) 
    {
        <button matButton="filled" class="btn-tactical" (click)="OuvriModalAjouterModifierMedaille()">
            <mat-icon>add_task</mat-icon> Créer distinction
        </button>
    }
</div>

<mat-tab-group>

    <mat-tab label="Distinction personnelle">
        <app-liste-medaille [listeMedaille]="ListerMedaille(0)" 
                                       [droit]="droit"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)"
                                      (onClickSuppMedaille)="Supprimer($event)" />
    </mat-tab>

    <mat-tab label="Distinction de service (Unique)">
        <app-liste-medaille [listeMedaille]="ListerMedaille(1)" 
                                      [droit]="droit"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)"
                                      (onClickSuppMedaille)="Supprimer($event)" />
    </mat-tab>

    <mat-tab label="Campagne (unique)">
        <app-liste-medaille [listeMedaille]="ListerMedaille(2)" 
                                      [droit]="droit"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)"
                                      (onClickSuppMedaille)="Supprimer($event)" />
    </mat-tab>
</mat-tab-group>
