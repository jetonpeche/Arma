<div style="text-align: center; margin-bottom: 20px;">
    <h1>Médaille</h1>

    @if (droit.peutEcrire)
    {
        <button matButton="filled" (click)="OuvriModalAjouterModifierMedaille()">
            <mat-icon>add</mat-icon>
            Ajouter une médaille
        </button>
    }
</div>

<mat-tab-group>

    <mat-tab label="Distinction personnelle">
        <app-liste-medaille [listeMedaille]="ListerMedaille(0)" 
                                      [peutEcrire]="droit.peutEcrire"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)" />
    </mat-tab>

    <mat-tab label="Distinction de service (Unique)">
        <app-liste-medaille [listeMedaille]="ListerMedaille(1)" 
                                      [peutEcrire]="droit.peutEcrire"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)" />
    </mat-tab>

    <mat-tab label="Campagne (unique)">
        <app-liste-medaille [listeMedaille]="ListerMedaille(2)" 
                                      [peutEcrire]="droit.peutEcrire"
                                      (onClickMedaille)="OuvriModalAjouterModifierMedaille($event)" />
    </mat-tab>
</mat-tab-group>
