<div style="text-align: center; margin-bottom: 20px;">
    <h1>Médaille</h1>

    @if (droit.peutEcrire) 
    {
        <button matButton="filled" (click)="OuvriModalAjouterModifierMedaille()">
            <mat-icon>add</mat-icon>
            Ajouter une médaille
        </button>
    }
</div>

<mat-tab-group>

    <mat-tab label="Distinction personnelle">
        
        <jp-grid-container [gap]="12" style="margin-top: 20px;">
        @for (element of listeMedaille(); track element.id) 
        {
            <jp-grid-element [colDefault]="6">
            <mat-card>
                  <mat-card-header>
                        <mat-card-title>{{ element.nom }}</mat-card-title>
                        <mat-card-subtitle>{{ element.nbPoint > 1 ? "Points" : "Point" }}: {{ element.nbPoint }}</mat-card-subtitle>
                    </mat-card-header>

                    <mat-card-content>
                        {{ element.description }}

                        <img height="100" width="250" [src]="element.nomFichier">
                    </mat-card-content>
                    @if (droit.peutEcrire) 
                    {
                        <mat-card-actions align="end">
                            <button matButton="filled" (click)="OuvriModalAjouterModifierMedaille(element)">
                                Modifier
                            </button>
                        </mat-card-actions>
                    }
            </mat-card>
            </jp-grid-element>
        }
        </jp-grid-container>
    </mat-tab>

    <mat-tab label="Distinction de service">
        
    </mat-tab>

    <mat-tab label="Campagne">
        
    </mat-tab>
</mat-tab-group>
