<div style="text-align: center; margin-bottom: 20px;">
    <h1>Spécialité</h1>

    @if(droit?.peutLire)
    {
        <button matButton="filled" (click)="GestionSpecialite()">
            <mat-icon>edit</mat-icon>
            Gestion spécialité
        </button>
    }
</div>

@for (element of listeSpecialite(); track element.id) 
{
    <mat-card style="margin-bottom: 10px;">
        <mat-card-header>
            <mat-card-title>{{ element.nom }}</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <p>{{ element.description }}</p>
        </mat-card-content>
    </mat-card>
}
