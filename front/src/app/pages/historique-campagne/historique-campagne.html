<div style="text-align: center; margin-bottom: 20px;">
    <h1>Historique de campagne</h1>

    @if (droit.peutEcrire)
    {
        <button matButton="filled" (click)="OuvriModalAjouterModifierHistoriqueCampagne()">
            <mat-icon>add</mat-icon>
            Ajouter une campagne
        </button>
    }
</div>

@for (element of listeHistoriqueCampagne(); track $index) 
{
    <mat-card>
        <mat-card-title>{{ element.titre }}</mat-card-title>
        <mat-card-content>
            {{ element.titre }}

            <jp-grid-container>     
                @for (urlImg of element.listeUrlImage; track $index) 
                {
                    <jp-grid-element [colXs]="12" [colSm]="6" [colLg]="4">
                        <img [src]="urlImg" alt="photo de campagne">
                    </jp-grid-element>
                }
            </jp-grid-container>
        </mat-card-content>
        
        <mat-card-actions align="end">
            @if(droit.peutEcrire)
            {
                <button matButton="filled" (click)="OuvriModalAjouterModifierHistoriqueCampagne(element)">
                    Modifier
                </button>
            }
        </mat-card-actions>
    </mat-card>
}
