@if(accesAutorise()) 
{
    <div class="global-grid-flash"></div>
    <div class="global-logo-flash"></div>
}

<mat-card class="unsc-datapad" [class.access-granted]="accesAutorise()" appearance="outlined">

    @if(accesAutorise()) 
    {
        <div class="success-overlay">
            
            <div class="biometric-scanner">
                <mat-icon class="fingerprint-icon">fingerprint</mat-icon>
                <div class="scanner-line"></div>
            </div>

            <div class="auth-message">
                <h2>ACCÈS AUTORISÉ</h2>
                <p>Déchiffrement des protocoles en cours...</p>
            </div>

        </div>
    }

    <!-- Barre décorative supérieure (ajoutée via CSS) -->
    <div class="datapad-header-accent"></div>

    <mat-card-header class="unsc-header">
        <mat-card-title class="unsc-title">Terminal UNSC</mat-card-title>
        <mat-card-subtitle class="unsc-subtitle">Identification requise // Réseau sécurisé</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content class="unsc-content">
        <form [formGroup]="form">
            <jp-grid-container [gap]="15">
                <jp-grid-element [colDefault]="12">
                    <jp-input-text label="Identifiant Marine" formControlName="login" />
                </jp-grid-element>

                <jp-grid-element [colDefault]="12">
                    <jp-input-password label="Code d'accès" formControlName="mdp" />
                </jp-grid-element>
            </jp-grid-container>
        </form>
    </mat-card-content>

    <mat-card-actions class="unsc-actions">
        <jp-button-loader label="Enrôlement" (clicked)="OuvrirModalInscription()" class="btn-secondary" />&nbsp;
        <jp-button-loader label="Authentification" [loading]="btnClick()" (clicked)="Valider()" class="btn-primary" />
    </mat-card-actions>
</mat-card>
