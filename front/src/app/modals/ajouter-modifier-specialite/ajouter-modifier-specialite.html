<h2 mat-dialog-title>{{ labelBtn() }} une spécialité</h2>
<mat-dialog-content>
    <form [formGroup]="form">
        <jp-grid-container>
            <jp-grid-element [colXs]="12" [colMd]="8">
                <jp-input-text style="display: block; margin-bottom: 15px;" label="Nom" formControlName="nom" />
            </jp-grid-element>

            <jp-grid-element [colXs]="12" [colMd]="4">
                <jp-input-text style="display: block; margin-bottom: 15px;" label="Raccourci" formControlName="raccourci" />
            </jp-grid-element>

            <jp-grid-element [colDefault]="12">
                <jp-autocomplete [dataSource]="listeGrade()" label="Grade" formControlName="idGrade" requireSelection />
            </jp-grid-element>

            <jp-grid-element [colDefault]="12">
                <mat-checkbox labelPosition="before" formControlName="estNavy">Navy ?</mat-checkbox>
            </jp-grid-element>

            <jp-grid-element [colDefault]="12">
                <jp-textarea label="Description" formControlName="description" [rows]="5" showMaxLength />
            </jp-grid-element>
        </jp-grid-container>
    </form>
</mat-dialog-content>
<mat-dialog-actions>
    <jp-button-loader matButton="text" matDialogClose label="Fermer" />&nbsp;
    <jp-button-loader [loading]="btnClick()" (clicked)="ValiderForm()" [label]="labelBtn()" />
</mat-dialog-actions>
